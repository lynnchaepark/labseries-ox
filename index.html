<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lab Series OX Championship</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="wrap">
    <section class="card" id="joinScreen">
      <p class="eyebrow">LAB SERIES</p>
      <h1>OX Championship</h1>
      <p class="sub">참여할 조를 선택해주세요.</p>
      <label class="label" for="teamSelect">조 선택</label>
      <select id="teamSelect" class="input">
        <option value="">조를 선택하세요</option>
        <option value="1">1조</option>
        <option value="2">2조</option>
        <option value="3">3조</option>
        <option value="4">4조</option>
      </select>
      <button id="joinBtn" class="btn primary">입장하기</button>
      <p id="joinMsg" class="msg"></p>
    </section>

    <section class="card hidden" id="waitScreen">
      <p class="eyebrow">대기 중</p>
      <h2><span id="waitTeam"></span> 입장 완료</h2>
      <p class="sub">진행자가 시작 버튼을 누르면 퀴즈가 시작됩니다.</p>
      <div class="loader"></div>
    </section>

    <section class="card hidden" id="quizScreen">
      <div class="toprow">
        <span id="teamBadge" class="badge"></span>
        <span id="qCount" class="badge ghost"></span>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
      <h2 id="questionText" class="question"></h2>
      <div class="oxgrid">
        <button class="oxbtn" data-answer="O">O</button>
        <button class="oxbtn" data-answer="X">X</button>
      </div>
      <button id="nextBtn" class="btn primary" disabled>다음 문제로 넘어가기</button>
      <p class="tiny">선택 후 다음 버튼을 눌러주세요. 빠르게 완료할수록 동점 시 유리합니다.</p>
    </section>

    <section class="card hidden" id="doneScreen">
      <p class="eyebrow">제출 완료</p>
      <h2>수고하셨습니다!</h2>
      <p class="sub">결과 공개를 기다려주세요.</p>
      <div class="scorebox">
        <span>내 조 점수</span>
        <strong id="myScore">0점</strong>
      </div>
    </section>

    <section class="card hidden" id="resultScreen">
      <p class="eyebrow">RESULT</p>
      <h2>최종 순위</h2>
      <div id="resultList" class="resultList"></div>
      <p class="tiny">동점일 경우, 총 답변 제출 소요시간이 짧은 팀이 상위 순위입니다.</p>
    </section>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
