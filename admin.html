<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin | Lab Series OX</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="wrap adminWrap">
    <section class="card wide">
      <p class="eyebrow">ADMIN</p>
      <h1>Lab Series OX Championship</h1>
      <p class="sub">팀별 대표가 입장했는지 확인 후 시작해주세요.</p>

      <div class="adminBtns">
        <button id="resetBtn" class="btn danger">초기화</button>
        <button id="startBtn" class="btn primary">START</button>
        <button id="revealBtn" class="btn gold">결과 공개</button>
      </div>

      <div class="statusBox">
        <span>현재 상태</span>
        <strong id="gameStatus">-</strong>
      </div>

      <h3>참가 현황</h3>
      <div id="teamStatus" class="teamStatus"></div>

      <h3>결과 미리보기</h3>
      <div id="adminResults" class="resultList"></div>
    </section>
  </main>
  <script type="module" src="./admin.js"></script>
</body>
</html>
